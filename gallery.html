<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander Reference</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mana-font@1.15.7/css/mana.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
</head>
<body>
  <header>
    <h1>📖 Commander Reference</h1>
    <div class="header-right">
      <a class="nav-link" id="adminNav" href="admin.html" style="display:none">🔧 Admin</a>
      <a class="nav-link" href="leaderboard.html">🏆 Leaderboard</a>
      <a class="nav-link" href="index.html">← Wheel</a>
      <button class="nav-link" id="rulesBtn" type="button">📜 Rules</button>
    </div>
  </header>

  <main class="gallery-main">
    <div class="gallery-bar">
      <input id="gallerySearch" type="text" placeholder="Search commanders…" autocomplete="off" />
      <span class="gallery-count"><span class="badge" id="galleryCount">0</span> cards</span>
      <div class="view-toggle" role="group" aria-label="View">
        <button type="button" class="view-btn" data-view="grid">▦ Grid</button>
        <button type="button" class="view-btn" data-view="list">☰ List</button>
      </div>
    </div>

    <div id="colorFilters" class="filter-chips" hidden>
      <span class="filter-label">Color identity:</span>
      <button type="button" class="filter-chip" data-color="W" title="White"><i class="ms ms-w ms-cost" data-letter="W" aria-hidden="true"></i></button>
      <button type="button" class="filter-chip" data-color="U" title="Blue"><i class="ms ms-u ms-cost" data-letter="U" aria-hidden="true"></i></button>
      <button type="button" class="filter-chip" data-color="B" title="Black"><i class="ms ms-b ms-cost" data-letter="B" aria-hidden="true"></i></button>
      <button type="button" class="filter-chip" data-color="R" title="Red"><i class="ms ms-r ms-cost" data-letter="R" aria-hidden="true"></i></button>
      <button type="button" class="filter-chip" data-color="G" title="Green"><i class="ms ms-g ms-cost" data-letter="G" aria-hidden="true"></i></button>
      <button type="button" class="filter-chip" data-color="C"><i class="ms ms-c ms-cost" data-letter="C" aria-hidden="true"></i> Colorless</button>
      <button type="button" id="myCmdBtn" class="filter-chip">🎯 My commander</button>
      <button type="button" id="clearColors" class="filter-chip">Clear</button>
      <span id="colorHint" class="filter-hint"></span>
    </div>

    <section id="secLive" class="gallery-sec">
      <button type="button" class="gallery-sec-head" data-sec="live" aria-expanded="true">
        <span class="gallery-caret" aria-hidden="true"></span>
        <span class="gallery-sec-title">Live commanders</span>
        <span class="gallery-sec-count" id="liveCount">0</span>
        <span class="gallery-sec-note">in the pool now</span>
      </button>
      <div class="gallery-sec-body">
        <ul id="gallery" class="gallery"></ul>
      </div>
    </section>

    <section id="secFuture" class="gallery-sec gallery-admin-sec" style="display:none">
      <button type="button" class="gallery-sec-head" data-sec="future" aria-expanded="true">
        <span class="gallery-caret" aria-hidden="true"></span>
        <span class="gallery-sec-title">⏳ Future updates</span>
        <span class="gallery-sec-count" id="futureCount">0</span>
        <span class="gallery-sec-note">additions &amp; art changes coming on the next store event</span>
      </button>
      <div class="gallery-sec-body">
        <ul id="galleryFuture" class="gallery"></ul>
      </div>
    </section>

    <section id="secLeaving" class="gallery-sec gallery-admin-sec" style="display:none">
      <button type="button" class="gallery-sec-head" data-sec="leaving" aria-expanded="true">
        <span class="gallery-caret" aria-hidden="true"></span>
        <span class="gallery-sec-title">⏳ Leaving soon</span>
        <span class="gallery-sec-count" id="leavingCount">0</span>
        <span class="gallery-sec-note">still rollable now — gone after the next store event</span>
      </button>
      <div class="gallery-sec-body">
        <ul id="galleryLeaving" class="gallery"></ul>
      </div>
    </section>

    <section id="secRetired" class="gallery-sec gallery-admin-sec" style="display:none">
      <button type="button" class="gallery-sec-head" data-sec="retired" aria-expanded="true">
        <span class="gallery-caret" aria-hidden="true"></span>
        <span class="gallery-sec-title">🚫 Retired / removed</span>
        <span class="gallery-sec-count" id="retiredCount">0</span>
        <span class="gallery-sec-note">admin only — removed from the pool, available to revolve back in</span>
      </button>
      <div class="gallery-sec-body">
        <ul id="galleryRetired" class="gallery"></ul>
      </div>
    </section>
  </main>

  <footer>
    <p>Every commander in the pool, in alphabetical order. Flip cards show both faces. This is a reference only — head back to the wheel to spin.</p>
  </footer>

  <div id="rulesModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-box" role="dialog" aria-modal="true" aria-label="League rules">
      <button id="rulesClose" class="modal-close" type="button" aria-label="Close">✕</button>
      <h2>📜 League rules</h2>
      <div id="rulesBody" class="rules-body">Loading…</div>
    </div>
  </div>

  <script type="module" src="gallery.js"></script>
</body>
</html>
